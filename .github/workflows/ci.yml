# CI — 린트·타입체크·의존성 취약점 스캔 자동화
# main 푸시 및 모든 PR에서 실행 (배포 전 게이트)
name: CI

on:
  push:
    branches: [main]
  pull_request:

# 같은 브랜치에서 새 커밋이 오면 이전 실행은 취소해 러너를 아낀다
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v7

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm ci 대신 npm install 사용:
      # 로컬(macOS)에서 생성한 lock에는 리눅스 전용 optional deps(@tailwindcss/oxide
      # wasm fallback = @emnapi/*)가 빠져 npm ci가 sync 불일치로 실패한다.
      # CI는 build를 하지 않아 재현성 요구가 낮고, npm install이 리눅스 optional을
      # 그때 해결하므로 lint·tsc·audit 실행에 충분하다.
      - name: 의존성 설치
        run: npm install --no-fund

      - name: ESLint
        run: npm run lint

      - name: 타입 체크
        run: npx tsc --noEmit

      # 의존성 취약점 스캔 — high 이상 발견 시 실패 (moderate는 Dependabot이 처리)
      - name: 의존성 취약점 스캔
        run: npm audit --audit-level=high
